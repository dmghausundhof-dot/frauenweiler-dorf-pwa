    <path d="M96 129 L264 129 L242 298 L118 298 Z" fill="#fefce8" stroke="#166534" stroke-width="12" filter="url(#shadow)"/>
    <path d="M137 158 H224" stroke="#f97316" stroke-width="12" stroke-linecap="round"/>
