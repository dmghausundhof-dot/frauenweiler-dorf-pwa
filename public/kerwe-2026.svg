    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#14532d" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#sky)"/>
  <circle cx="1020" cy="120" r="96" fill="#facc15" opacity="0.95"/>
  <circle cx="1015" cy="118" r="128" fill="#facc15" opacity="0.18"/>

