    <text x="335" y="105" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="800" fill="#14532d" letter-spacing="7">KERWE</text>
    <text x="335" y="214" text-anchor="middle" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="138" font-weight="900" fill="#f97316">26</text>
    <text x="335" y="278" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="800" fill="#166534">25.-27. Juli 2026</text>
    <text x="335" y="330" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="#334155">Frauenweiler</text>
